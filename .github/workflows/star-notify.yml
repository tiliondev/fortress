name: Star notification

on:
  watch:
    types: [started]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -s -X POST "https://agentpush.fly.dev/t/t_klywrkd34swd3sql" \
            -H "X-Title: New star on fortress" \
            -H "X-Priority: high" \
            -d "${{ github.actor }} starred ${{ github.repository }}"
